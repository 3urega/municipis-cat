apply plugin: 'com.android.application'

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreLocalFile = rootProject.file("keystore.local.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}
if (keystoreLocalFile.exists()) {
    def local = new Properties()
    keystoreLocalFile.withInputStream { local.load(it) }
    keystoreProperties.putAll(local)
}

def storePasswordEffective = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: keystoreProperties.getProperty("storePassword")
def keyPasswordEffective = System.getenv("ANDROID_KEY_PASSWORD") ?: System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: keystoreProperties.getProperty("keyPassword") ?: storePasswordEffective

def releaseSigningConfigured = keystorePropertiesFile.exists() \
    && keystoreProperties.getProperty("storeFile") != null \
    && !keystoreProperties.getProperty("storeFile").trim().isEmpty() \
    && storePasswordEffective != null \
    && !storePasswordEffective.isEmpty()

android {
    namespace "com.geodiari.app"
    compileSdk rootProject.ext.compileSdkVersion
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    defaultConfig {
        applicationId "com.geodiari.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 5
        versionName "1.1.4"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
            noCompress ''
        }
    }
    signingConfigs {
        release {
            if (releaseSigningConfigured) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keyPasswordEffective
                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword storePasswordEffective
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def runsReleaseBundle = graph.allTasks.any { it.name == "bundleRelease" || it.name == "assembleRelease" }
    if (!runsReleaseBundle) {
        return
    }
    if (!keystorePropertiesFile.exists() || keystoreProperties.getProperty("storeFile") == null || keystoreProperties.getProperty("storeFile").trim().isEmpty()) {
        return
    }
    if (!releaseSigningConfigured) {
        throw new GradleException('''
Firma release: falta la contrasenya del keystore. Opcions:
  1) PowerShell: $env:ANDROID_KEYSTORE_PASSWORD = "..." ; .\\gradlew.bat bundleRelease
  2) Crea android/keystore.local.properties (copia de keystore.local.properties.example) amb storePassword (i keyPassword si cal).
Vegeu README (Firma de release).
'''.trim())
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    // UMP (GDPR); mateixa versió que rootProject.ext.userMessagingPlatformVersion (variables.gradle)
    implementation "com.google.android.ump:user-messaging-platform:$rootProject.ext.userMessagingPlatformVersion"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
